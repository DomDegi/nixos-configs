id           = "domdegi/theme-switcher"
name         = "Theme Switcher"
version      = "1.0.0"
min_noctalia = "5.0.0"
author       = "domdegi"
license      = "MIT"
icon         = "palette"
description  = "Switch the whole rice between the palettes defined in nixos-configs (runs theme-switch)."
tags         = ["Bar"]

[[widget]]
id    = "widget"
entry = "widget.luau"

# The theme menu opened by the bar widget. After a successful switch it
# transitions in place to a wallpaper roster for the newly active theme
# (sized to fit that thumbnail grid too).
[[panel]]
id        = "panel"
entry     = "panel.luau"
width     = 360
height    = 480
placement = "floating"
position  = "center"
